<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarPrice AI - Premium Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Floating Shapes -->
<div class="shape shape1"></div>
<div class="shape shape2"></div>
<div class="shape shape3"></div>

<!-- Header -->
<header>
  <div class="logo-title">
    <img src="images/car-logo.png" alt="Logo">
    <h1>CarPrice AI</h1>
  </div>
  <div class="header-right">
    <p>Premium Dashboard</p>
    <button id="modeToggle">Dark/Light</button>
  </div>
</header>

<!-- Main Container -->
<div class="container">
  <h2 class="section-title">1. Input Dashboard</h2>

  <form id="form">
    <div class="form-grid">
      <div>
        <label>Year of Manufacture</label>
        <input type="number" id="year" placeholder="e.g., 2018">
      </div>
      <div>
        <label>Mileage Kms Driven</label>
        <input type="number" id="mileage" placeholder="e.g., 50000">
      </div>
      <div>
        <label>Engine CC</label>
        <input type="number" id="engine" placeholder="e.g., 1200">
      </div>
      <div>
        <label>Fuel Type</label>
        <select id="fuel">
          <option value="">Select</option>
          <option>Petrol</option>
          <option>Diesel</option>
          <option>CNG</option>
        </select>
      </div>
      <div>
        <label>Transmission</label>
        <select id="transmission">
          <option value="">Select</option>
          <option>Manual</option>
          <option>Automatic</option>
        </select>
      </div>
      <div>
        <label>Seller Type</label>
        <select id="seller">
          <option value="">Select</option>
          <option>Individual</option>
          <option>Dealer</option>
        </select>
      </div>
    </div>

    <button type="submit" class="primary-btn" id="predictBtn">Predict Selling Price</button>
    <button type="button" class="secondary-btn" onclick="resetForm()">Reset Form</button>
  </form>

  <div class="result-card" id="result">
    <div class="price-text" id="price"></div>
    <div class="confidence-text" id="confidenceText"></div>
    <div class="progress">
      <div class="progress-bar" id="confidenceBar"></div>
    </div>
  </div>
</div>

<!-- Footer -->
<footer>
  <p>Dataset Source: Kaggle Used Car Dataset | Model: Random Forest Regression | GitHub: https://github.com/your-team/car-price-ai</p>
</footer>

<script src="js/script.js"></script>
</body>
</html>
